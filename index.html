<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Highlight AbAb >= 4 Chars</title>
    <style>
        /* Dark Mode & Căn lề: Trên 20px, 2 biên 3px */
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background-color: #121212; 
            color: #e0e0e0; 
            margin: 20px 3px 0 3px; 
            padding: 0;
        }

        .container { max-width: 100%; margin: 0 auto; }

        textarea { 
            width: 100%; height: 180px; margin-bottom: 10px; padding: 12px; 
            border-radius: 8px; border: 1px solid #333; 
            background-color: #1e1e1e; color: #ffffff;
            box-sizing: border-box; font-size: 16px; outline: none;
        }
        textarea:focus { border-color: #bb86fc; }

        .controls { margin-bottom: 20px; display: flex; gap: 8px; flex-wrap: wrap; align-items: center; }

        #output { 
            background: #1e1e1e; padding: 15px; border: 1px solid #444; 
            border-radius: 8px; min-height: 120px; 
            white-space: pre-wrap; word-wrap: break-word; color: #cfcfcf;
            font-size: 18px; letter-spacing: 2px; line-height: 2;
        }

        /* Màu sắc: Vàng cho Ab, Xanh cho bA */
        .mark-Ab { background-color: #ffff00; color: #000; font-weight: bold; padding: 2px 0; }
        .mark-bA { background-color: #00bfff; color: #000; font-weight: bold; padding: 2px 0; }

        button, .file-label { 
            padding: 10px 15px; cursor: pointer; border: none; 
            border-radius: 6px; background: #3700b3; color: white; 
            font-weight: bold; font-size: 13px;
        }
        button:hover, .file-label:hover { background: #6200ee; }
        
        .btn-download { background: #cf6679; }
        
        #status { font-size: 12px; color: #03dac6; margin-left: 10px; }

        input[type="file"] { display: none; }
        .legend { margin-bottom: 10px; font-size: 13px; opacity: 0.8; }
        .dot { height: 10px; width: 10px; display: inline-block; border-radius: 50%; margin-right: 5px; }
    </style>
</head>
<body>

<div class="container">
    <h2 style="color: #bb86fc; margin-bottom: 5px;">Lọc xen kẽ (Độ dài &ge; 4)</h2>
    <div class="legend">
        <span><span class="dot" style="background: #ffff00;"></span>Ab (Bắt đầu Lớn)</span> | 
        <span><span class="dot" style="background: #00bfff;"></span>bA (Bắt đầu Bé)</span> |
        <strong>Yêu cầu: Độ dài &ge; 4 ký tự</strong>
    </div>
    
    <textarea id="inputText" placeholder="Dán dãy số vào đây..."></textarea>

    <div class="controls">
        <label class="file-label">Mở file .txt <input type="file" id="fileInput" accept=".txt"></label>
        <button class="btn-download" onclick="downloadFile()">Tải file</button>
        <span id="status"></span>
    </div>

    <div id="output"></div>
</div>

<script>
    const inputEl = document.getElementById('inputText');
    const statusText = document.getElementById('status');

    function getType(char) {
        if (!/[0-9]/.test(char)) return null;
        return parseInt(char) >= 5 ? 'A' : 'b';
    }

    function processText() {
        const text = inputEl.value;
        const output = document.getElementById('output');
        let resultHTML = "";
        let i = 0;

        while (i < text.length) {
            let currentType = getType(text[i]);

            if (currentType === null) {
                resultHTML += text[i];
                i++;
                continue;
            }

            let startType = currentType;
            let j = i;
            let tempMatch = text[i];
            let lastType = currentType;

            // Quét chuỗi xen kẽ tối đa có thể
            while (j + 1 < text.length) {
                let nextType = getType(text[j + 1]);
                if (nextType === null || nextType === lastType) break;
                tempMatch += text[j + 1];
                lastType = nextType;
                j++;
            }

            // CHỈ TÔ MÀU NẾU ĐỘ DÀI >= 4
            if (tempMatch.length >= 4) {
                let className = (startType === 'A') ? 'mark-Ab' : 'mark-bA';
                resultHTML += `<span class="${className}">${tempMatch}</span>`;
                i = j + 1;
            } else {
                // Nếu ngắn hơn 4, giữ nguyên text bình thường và nhảy 1 ký tự để xét tiếp
                resultHTML += text[i];
                i++;
            }
        }
        output.innerHTML = resultHTML;
        
        // Tự động lưu
        localStorage.setItem('autoSavedDataV5', text);
        showStatus("Đã lưu...");
    }

    function showStatus(msg) {
        statusText.innerText = msg;
        setTimeout(() => { statusText.innerText = ""; }, 1500);
    }

    inputEl.addEventListener('input', processText);

    window.onload = function() {
        const saved = localStorage.getItem('autoSavedDataV5');
        if (saved) {
            inputEl.value = saved;
            processText();
        }
    };

    document.getElementById('fileInput').addEventListener('change', function(e) {
        const file = e.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = function(e) {
            inputEl.value = e.target.result;
            processText();
        };
        reader.readAsText(file);
    });

    function downloadFile() {
        const blob = new Blob([inputEl.value], { type: 'text/plain' });
        const link = document.createElement('a');
        link.href = URL.createObjectURL(blob);
        link.download = "data_xenke_4.txt";
        link.click();
    }
</script>

</body>
</html>
