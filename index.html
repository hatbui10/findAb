<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Highlight Ab/bA - Fixed Status</title>
    <style>
        /* Dark Mode & Căn lề: Trên 20px, 2 biên 3px */
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background-color: #121212; 
            color: #e0e0e0; 
            margin: 20px 3px 0 3px; 
            padding: 0;
        }

        .container { max-width: 100%; margin: 0 auto; }

        /* Thông báo cố định ở góc trên bên phải */
        #file-info-badge {
            position: fixed;
            top: 10px;
            right: 10px;
            background: #2c2c2c;
            color: #03dac6;
            padding: 8px 15px;
            border-radius: 6px;
            border: 1px solid #03dac6;
            font-size: 13px;
            font-weight: bold;
            z-index: 1000;
            box-shadow: 0 4px 10px rgba(0,0,0,0.5);
        }

        .config-bar {
            background: #1e1e1e;
            padding: 10px;
            border-radius: 8px;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            gap: 15px;
            border: 1px solid #333;
        }

        input[type="number"] {
            width: 60px;
            padding: 5px;
            border-radius: 4px;
            border: 1px solid #bb86fc;
            background: #2c2c2c;
            color: #fff;
            text-align: center;
            font-weight: bold;
        }

        textarea { 
            width: 100%; height: 180px; margin-bottom: 10px; padding: 12px; 
            border-radius: 8px; border: 1px solid #333; 
            background-color: #1e1e1e; color: #ffffff;
            box-sizing: border-box; font-size: 16px; outline: none;
        }
        textarea:focus { border-color: #bb86fc; }

        .controls { margin-bottom: 20px; display: flex; gap: 8px; flex-wrap: wrap; align-items: center; }

        #output { 
            background: #1e1e1e; padding: 15px; border: 1px solid #444; 
            border-radius: 8px; min-height: 120px; 
            white-space: pre-wrap; word-wrap: break-word; color: #cfcfcf;
            font-size: 18px; letter-spacing: 2px; line-height: 2;
        }

        .mark-Ab { background-color: #ffff00; color: #000; font-weight: bold; padding: 2px 0; }
        .mark-bA { background-color: #00bfff; color: #000; font-weight: bold; padding: 2px 0; }

        button, .file-label { 
            padding: 8px 15px; cursor: pointer; border: none; 
            border-radius: 6px; background: #3700b3; color: white; 
            font-weight: bold; font-size: 13px;
        }
        
        .btn-download { background: #cf6679; }

        input[type="file"] { display: none; }
        .legend { font-size: 13px; opacity: 0.9; display: flex; gap: 10px; }
        .dot { height: 10px; width: 10px; display: inline-block; border-radius: 50%; margin-right: 5px; }
    </style>
</head>
<body>

<div id="file-info-badge">Trạng thái: Chưa có dữ liệu</div>

<div class="container">
    <div class="config-bar">
        <label for="minLength">Độ dài lọc ≥ </label>
        <input type="number" id="minLength" value="4" min="2" oninput="processText()">
        
        <div class="legend">
            <span><span class="dot" style="background: #ffff00;"></span>Ab</span>
            <span><span class="dot" style="background: #00bfff;"></span>bA</span>
        </div>
    </div>
    
    <textarea id="inputText" placeholder="Dán dãy số hoặc mở file..."></textarea>

    <div class="controls">
        <label class="file-label">Mở file .txt <input type="file" id="fileInput" accept=".txt"></label>
        <button class="btn-download" onclick="downloadFile()">Tải file</button>
        <button onclick="clearData()" style="background: #444;">Xóa hết</button>
    </div>

    <div id="output"></div>
</div>

<script>
    const inputEl = document.getElementById('inputText');
    const minLengthEl = document.getElementById('minLength');
    const infoBadge = document.getElementById('file-info-badge');

    function getType(char) {
        if (!/[0-9]/.test(char)) return null;
        return parseInt(char) >= 5 ? 'A' : 'b';
    }

    // Cập nhật thông báo số lượng ký tự
    function updateBadge(text) {
        // Chỉ đếm các con số, bỏ qua khoảng trắng/xuống dòng nếu muốn đếm chính xác số lượng dữ liệu
        const count = text.replace(/\s/g, '').length; 
        if (count > 0) {
            infoBadge.innerHTML = `Đã tải file: ${count.toLocaleString()} số`;
            infoBadge.style.color = "#03dac6";
            infoBadge.style.borderColor = "#03dac6";
        } else {
            infoBadge.innerHTML = `Trạng thái: Trống`;
            infoBadge.style.color = "#888";
            infoBadge.style.borderColor = "#444";
        }
    }

    function processText() {
        const text = inputEl.value;
        const output = document.getElementById('output');
        const minLen = parseInt(minLengthEl.value) || 4;
        let resultHTML = "";
        let i = 0;

        // Cập nhật badge
        updateBadge(text);

        while (i < text.length) {
            let currentType = getType(text[i]);
            if (currentType === null) {
                resultHTML += text[i];
                i++;
                continue;
            }

            let startType = currentType;
            let j = i;
            let tempMatch = text[i];
            let lastType = currentType;

            while (j + 1 < text.length) {
                let nextType = getType(text[j + 1]);
                if (nextType === null || nextType === lastType) break;
                tempMatch += text[j + 1];
                lastType = nextType;
                j++;
            }

            if (tempMatch.length >= minLen) {
                let className = (startType === 'A') ? 'mark-Ab' : 'mark-bA';
                resultHTML += `<span class="${className}">${tempMatch}</span>`;
                i = j + 1;
            } else {
                resultHTML += text[i];
                i++;
            }
        }
        output.innerHTML = resultHTML;
        
        localStorage.setItem('autoSavedDataV6', text);
        localStorage.setItem('savedMinLength', minLen);
    }

    function clearData() {
        if(confirm("Xóa toàn bộ dữ liệu?")) {
            inputEl.value = "";
            localStorage.removeItem('autoSavedDataV6');
            processText();
        }
    }

    inputEl.addEventListener('input', processText);

    window.onload = function() {
        const savedText = localStorage.getItem('autoSavedDataV6');
        const savedLen = localStorage.getItem('savedMinLength');
        
        if (savedLen) minLengthEl.value = savedLen;
        if (savedText) {
            inputEl.value = savedText;
            processText();
        }
    };

    document.getElementById('fileInput').addEventListener('change', function(e) {
        const file = e.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = function(e) {
            inputEl.value = e.target.result;
            processText();
        };
        reader.readAsText(file);
    });

    function downloadFile() {
        const blob = new Blob([inputEl.value], { type: 'text/plain' });
        const link = document.createElement('a');
        link.href = URL.createObjectURL(blob);
        link.download = "data_save.txt";
        link.click();
    }
</script>

</body>
</html>
