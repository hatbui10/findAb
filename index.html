<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Phân Tích Chuỗi Số A-b</title>
    <style>
        :root {
            --bg-color: #f4f4f9;
            --text-color: #333;
            --container-bg: #ffffff;
            --border-color: #ddd;
            --cell-bg: #fff;
            --label-bg: #eef2ff;
            --primary-color: #4a90e2;
        }

        [data-theme="dark"] {
            --bg-color: #1a1a1a;
            --text-color: #f0f0f0;
            --container-bg: #2d2d2d;
            --border-color: #444;
            --cell-bg: #3d3d3d;
            --label-bg: #2c3e50;
        }

        body {
            font-family: 'Segoe UI', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            padding: 20px;
        }

        .container {
            max-width: 600px;
            margin: 0 auto;
            background: var(--container-bg);
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }

        .controls {
            display: flex;
            flex-direction: column;
            gap: 15px;
            margin-bottom: 20px;
            padding-bottom: 15px;
            border-bottom: 2px solid var(--border-color);
        }

        .grid-header {
            display: grid;
            grid-template-columns: repeat(3, 40px) 20px repeat(3, 40px);
            gap: 5px;
            font-weight: bold;
            margin-bottom: 10px;
            text-align: center;
        }

        #numberGrid {
            display: grid;
            grid-template-columns: repeat(3, 40px) 20px repeat(3, 40px);
            gap: 5px;
            justify-content: start;
        }

        .cell {
            width: 40px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 1px solid var(--border-color);
            background: var(--cell-bg);
            border-radius: 4px;
            font-weight: bold;
        }

        .cell.label {
            background-color: var(--label-bg);
            color: #e67e22;
            border-style: dashed;
        }

        .separator {
            width: 20px;
        }

        .btn {
            padding: 10px;
            cursor: pointer;
            border: none;
            border-radius: 5px;
            background: var(--primary-color);
            color: white;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>Phân Tích Logic A-b</h2>
    
    <div class="controls">
        <input type="file" id="fileInput" accept=".txt">
        <button class="btn" onclick="toggleDarkMode()">Đổi màu nền</button>
        <button class="btn" style="background:#e74c3c" onclick="clearData()">Xóa dữ liệu</button>
    </div>

    <div class="grid-header">
        <span>Số</span><span></span><span></span>
        <span></span>
        <span>Xét</span><span></span><span></span>
    </div>
    <div id="numberGrid"></div>
</div>

<script>
    const fileInput = document.getElementById('fileInput');
    const numberGrid = document.getElementById('numberGrid');
    let rawNumbers = localStorage.getItem('savedNumbers') || "";

    window.onload = () => {
        if (localStorage.getItem('theme') === 'dark') document.body.setAttribute('data-theme', 'dark');
        if (rawNumbers) renderLogic();
    };

    fileInput.addEventListener('change', (e) => {
        const file = e.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = (event) => {
            rawNumbers = event.target.result.replace(/\D/g, '');
            localStorage.setItem('savedNumbers', rawNumbers);
            renderLogic();
        };
        reader.readAsText(file);
    });

    function renderLogic() {
        numberGrid.innerHTML = "";
        const fragment = document.createDocumentFragment();
        
        // Chia nhóm 3 số
        let groups = [];
        for (let i = 0; i < rawNumbers.length; i += 3) {
            groups.push(rawNumbers.substring(i, i + 3));
        }

        let nextLabels = ["", "", ""]; // Nhãn cho hàng hiện tại (tính từ hàng trước)

        groups.forEach((group) => {
            // 1. Hiển thị 3 số đầu của hàng
            for (let i = 0; i < 3; i++) {
                const div = document.createElement('div');
                div.className = 'cell';
                div.textContent = group[i] || "-";
                fragment.appendChild(div);
            }

            // 2. Ô khoảng cách
            const sep = document.createElement('div');
            sep.className = 'separator';
            fragment.appendChild(sep);

            // 3. Hiển thị 3 nhãn A-b dựa trên kết quả hàng TRƯỚC
            for (let i = 0; i < 3; i++) {
                const div = document.createElement('div');
                div.className = 'cell label';
                div.textContent = nextLabels[i];
                fragment.appendChild(div);
            }

            // 4. TÍNH TOÁN LOGIC CHO HÀNG TIẾP THEO
            let countA = 0;
            let countB = 0;
            
            // ĐỊNH NGHĨA: Số chẵn là A, Số lẻ là b
            for (let char of group) {
                let val = parseInt(char);
                if (!isNaN(val)) {
                    if (val % 2 === 0) countA++; // Chẵn = A
                    else countB++;               // Lẻ = b
                }
            }

            // Áp dụng quy tắc của bạn
            if (countA >= 2) {
                nextLabels = ['b', 'A', 'A'];
            } else if (countB >= 2) {
                nextLabels = ['A', 'b', 'b'];
            } else {
                nextLabels = ['', '', ''];
            }
        });

        numberGrid.appendChild(fragment);
    }

    function toggleDarkMode() {
        const isDark = document.body.hasAttribute('data-theme');
        if (isDark) {
            document.body.removeAttribute('data-theme');
            localStorage.setItem('theme', 'light');
        } else {
            document.body.setAttribute('data-theme', 'dark');
            localStorage.setItem('theme', 'dark');
        }
    }

    function clearData() {
        if (confirm("Xóa hết dữ liệu?")) {
            localStorage.removeItem('savedNumbers');
            rawNumbers = "";
            numberGrid.innerHTML = "";
            fileInput.value = "";
        }
    }
</script>

</body>
</html>
