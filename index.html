<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Phân Tích Tổ Hợp 8 Trường Hợp</title>
    <style>
        :root {
            --bg-color: #121212;
            --text-color: #e0e0e0;
            --container-bg: #1e1e1e;
            --border-color: #333;
            --cell-bg: #2d2d2d;
            --label-bg: #252525;
            --primary-color: #3498db;
            --highlight-color: #f1c40f; 
            --input-bg: #333;
        }

        [data-theme="light"] {
            --bg-color: #f4f7f6;
            --text-color: #333;
            --container-bg: #fff;
            --border-color: #ddd;
            --cell-bg: #fff;
            --label-bg: #f8f9fa;
            --primary-color: #2980b9;
            --input-bg: #fff;
        }

        body {
            font-family: 'Segoe UI', Tahoma, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            padding: 20px;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
            background: var(--container-bg);
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .config-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 15px;
            background: var(--label-bg);
            padding: 20px;
            border-radius: 8px;
            margin-bottom: 25px;
            border: 1px solid var(--border-color);
        }

        .rule-item {
            display: flex;
            flex-direction: column;
            gap: 5px;
        }

        .rule-item label {
            font-size: 0.85em;
            font-weight: bold;
            color: var(--primary-color);
        }

        .rule-item input {
            padding: 8px;
            text-align: center;
            border-radius: 4px;
            border: 1px solid var(--border-color);
            background: var(--input-bg);
            color: var(--text-color);
            
            font-weight: bold;
        }

        .controls {
            display: flex;
            gap: 12px;
            margin-bottom: 25px;
        }

        .grid-header {
            display: grid;
            grid-template-columns: repeat(3, 50px) 30px repeat(3, 50px);
            gap: 10px;
            font-weight: bold;
            margin-bottom: 10px;
            text-align: center;
        }

        #numberGrid {
            display: grid;
            grid-template-columns: repeat(3, 50px) 30px repeat(3, 50px);
            gap: 10px;
        }

        .cell {
            width: 50px;
            height: 50px;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 1px solid var(--border-color);
            background: var(--cell-bg);
            border-radius: 6px;
            font-weight: bold;
            font-size: 1.2em;
        }

        .cell.label {
            background-color: var(--label-bg);
            color: var(--primary-color);
            border-style: dashed;
        }

        .match-highlight {
            background-color: var(--highlight-color) !important;
            color: #000 !important;
            border-color: #f39c12 !important;
        }

        .separator { width: 30px; }

        button {
            padding: 10px 20px;
            cursor: pointer;
            border: none;
            border-radius: 6px;
            background: var(--primary-color);
            color: white;
            font-weight: bold;
        }

        .apply-btn {
            grid-column: 1 / -1;
            background: #27ae60;
            margin-top: 10px;
        }
    </style>
</head>
<body data-theme="dark">

<div class="container">
    <h2 style="text-align:center;">Cấu Hình 8 Tổ Hợp Logic</h2>

    <div class="config-grid" id="configGrid">
        <div class="rule-item"><label>AAA →</label><input type="text" id="rule_AAA" value="AAb" maxlength="3"></div>
        <div class="rule-item"><label>AAb →</label><input type="text" id="rule_AAb" value="" maxlength="3"></div>
        <div class="rule-item"><label>AbA →</label><input type="text" id="rule_AbA" value="Abb" maxlength="3"></div>
        <div class="rule-item"><label>Abb →</label><input type="text" id="rule_Abb" value="" maxlength="3"></div>
        <div class="rule-item"><label>bAA →</label><input type="text" id="rule_bAA" value="bbb" maxlength="3"></div>
        <div class="rule-item"><label>bAb →</label><input type="text" id="rule_bAb" value="" maxlength="3"></div>
        <div class="rule-item"><label>bbA →</label><input type="text" id="rule_bbA" value="" maxlength="3"></div>
        <div class="rule-item"><label>bbb →</label><input type="text" id="rule_bbb" value="" maxlength="3"></div>
        
        <button class="apply-btn" onclick="renderLogic()">Cập Nhật & Lưu Quy Tắc</button>
    </div>
    
    <div class="controls">
        <input type="file" id="fileInput" accept=".txt" style="background: var(--label-bg); padding: 8px; border-radius: 4px; flex-grow: 1;">
        <button onclick="toggleDarkMode()" style="background: #7f8c8d;">Sáng/Tối</button>
        <button style="background:#e74c3c" onclick="clearData()">Xóa hết</button>
    </div>

    <div class="grid-header">
        <span>S1</span><span>S2</span><span>S3</span>
        <span></span>
        <span>KQ1</span><span>KQ2</span><span>KQ3</span>
    </div>
    
    <div id="numberGrid"></div>
</div>

<script>
    const fileInput = document.getElementById('fileInput');
    const numberGrid = document.getElementById('numberGrid');
    const patterns = ['AAA', 'AAb', 'AbA', 'Abb', 'bAA', 'bAb', 'bbA', 'bbb'];
    
    let rawNumbers = localStorage.getItem('savedNumbers') || "";

    window.onload = () => {
        // Load quy tắc từ storage
        patterns.forEach(p => {
            const saved = localStorage.getItem('rule_' + p);
            if (saved) document.getElementById('rule_' + p).value = saved;
        });
        
        const savedTheme = localStorage.getItem('theme') || 'dark';
        document.body.setAttribute('data-theme', savedTheme);

        if (rawNumbers) renderLogic();
    };

    fileInput.addEventListener('change', (e) => {
        const file = e.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = (event) => {
            rawNumbers = event.target.result.replace(/\D/g, '');
            localStorage.setItem('savedNumbers', rawNumbers);
            renderLogic();
        };
        reader.readAsText(file);
    });

    function getNumType(char) {
        let n = parseInt(char);
        if (isNaN(n)) return null;
        return (n >= 5) ? 'A' : 'b'; 
    }

    function renderLogic() {
        // Lưu toàn bộ quy tắc
        patterns.forEach(p => {
            localStorage.setItem('rule_' + p, document.getElementById('rule_' + p).value.trim());
        });

        numberGrid.innerHTML = "";
        const fragment = document.createDocumentFragment();
        
        let groups = [];
        for (let i = 0; i < rawNumbers.length; i += 3) {
            groups.push(rawNumbers.substring(i, i + 3));
        }

        let nextLabels = ["", "", ""]; 

        groups.forEach((group) => {
            // Hiển thị số thực tế
            for (let i = 0; i < 3; i++) {
                const div = document.createElement('div');
                div.className = 'cell';
                div.textContent = group[i] || "-";
                fragment.appendChild(div);
            }

            // Ngăn cách
            const sep = document.createElement('div');
            sep.className = 'separator';
            fragment.appendChild(sep);

            // Hiển thị dự đoán (Kết quả áp dụng từ hàng TRƯỚC)
            for (let i = 0; i < 3; i++) {
                const div = document.createElement('div');
                div.className = 'cell label';
                const labelValue = nextLabels[i];
                div.textContent = labelValue;

                if (labelValue !== "" && group[i]) {
                    if (getNumType(group[i]) === labelValue) {
                        div.classList.add('match-highlight');
                    }
                }
                fragment.appendChild(div);
            }

            // TÍNH TOÁN CHO HÀNG TIẾP THEO
            if (group.length === 3) {
                // Xác định tổ hợp hiện tại (VD: "AbA")
                let currentPattern = "";
                for(let char of group) {
                    currentPattern += getNumType(char);
                }

                // Lấy quy tắc tương ứng từ ô Input
                let ruleStr = document.getElementById('rule_' + currentPattern).value.trim();                
                if (ruleStr.length === 3) {
                    nextLabels = ruleStr.split('');
                } else {
                    nextLabels = ["", "", ""];
                }
            } else {
                nextLabels = ["", "", ""];
            }
        });

        numberGrid.appendChild(fragment);
    }

    function toggleDarkMode() {
        const currentTheme = document.body.getAttribute('data-theme');
        const newTheme = currentTheme === 'dark' ? 'light' : 'dark';
        document.body.setAttribute('data-theme', newTheme);
        localStorage.setItem('theme', newTheme);
    }

    function clearData() {
        if (confirm("Xóa dữ liệu cũ?")) {
            localStorage.removeItem('savedNumbers');
            rawNumbers = "";
            renderLogic();
        }
    }
</script>
</body>
</html>
