<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Phân Tích Logic - Tùy Chỉnh Toàn Diện</title>
    <style>
        :root {
            --bg-color: #121212; --text-color: #e0e0e0; --container-bg: #1e1e1e;
            --border-color: #333; --cell-bg: #2d2d2d; --primary-color: #3498db;
            --highlight-color: #f1c40f; --input-bg: #333; --accent-color: #e67e22;
        }
        body {
            font-family: 'Segoe UI', Tahoma, sans-serif; background-color: var(--bg-color); color: var(--text-color);
            margin: 0; height: 100vh; display: flex; flex-direction: column; overflow: hidden; padding: 20px;
        }
        .main-layout { display: flex; gap: 20px; max-width: 1400px; margin: 0 auto; flex: 1; width: 100%; overflow: hidden; }
        
        .left-panel { flex: 2; overflow-y: auto; background: var(--container-bg); padding: 20px; border-radius: 12px; border: 1px solid var(--border-color); }
        .log-panel { flex: 1; background: var(--container-bg); padding: 20px; border-radius: 12px; border: 1px solid var(--border-color); display: flex; flex-direction: column; overflow: hidden; }
        
        .log-title { font-weight: bold; margin-bottom: 10px; color: var(--highlight-color); border-bottom: 1px solid #444; padding-bottom: 5px; text-align: center; }
        #logList { overflow-y: auto; list-style: none; padding: 0; margin: 0; }
        .log-item { 
            padding: 10px; background: rgba(255,255,255,0.05); margin-bottom: 8px; border-radius: 6px; 
            cursor: pointer; border-left: 4px solid #e74c3c; transition: 0.2s; font-size: 0.85em;
        }
        .log-item:hover { background: rgba(255,255,255,0.1); }

        #numberGrid { display: grid; grid-template-columns: repeat(3, 45px) 25px repeat(3, 45px) 40px; gap: 8px; justify-content: center; padding-bottom: 50px; }
        .cell { width: 45px; height: 45px; display: flex; align-items: center; justify-content: center; border: 1px solid var(--border-color); background: var(--cell-bg); font-weight: bold; border-radius: 4px; }
        .cell.label { border-style: dashed; color: var(--primary-color); }
        .match-highlight { background-color: var(--highlight-color) !important; color: #000 !important; box-shadow: 0 0 10px var(--highlight-color); }
        .row-index { color: #666; font-size: 0.75em; display: flex; align-items: center; justify-content: center; }
        
        @keyframes flash-red {
            0% { background-color: var(--cell-bg); transform: scale(1); }
            50% { background-color: #ff4757; color: white; transform: scale(1.1); box-shadow: 0 0 15px #ff4757; }
            100% { background-color: var(--cell-bg); transform: scale(1); }
        }
        .blink-active { animation: flash-red 0.4s ease-in-out 15; z-index: 100; position: relative; }

        .config-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin-bottom: 15px; background: #252525; padding: 15px; border-radius: 8px; }
        .rule-item { display: flex; flex-direction: column; align-items: center; }
        .rule-item label { font-size: 11px; margin-bottom: 4px; color: #aaa; }
        .rule-item input { width: 90%; padding: 6px; background: var(--input-bg); color: #fff; border: 1px solid #444; text-align: center; border-radius: 4px; font-weight: bold; }
        
        .control-bar { background: #2c3e50; padding: 15px; border-radius: 8px; margin-bottom: 15px; display: flex; flex-wrap: wrap; gap: 15px; align-items: center; justify-content: center; }
        .input-group { display: flex; align-items: center; gap: 8px; background: #1a1a1a; padding: 5px 12px; border-radius: 4px; border: 1px solid var(--primary-color); }
        .input-group label { font-size: 12px; font-weight: bold; color: var(--primary-color); }
        .input-group input { width: 80px; padding: 5px; background: transparent; border: none; color: white; font-weight: bold; text-align: center; font-size: 14px; }

        button { cursor: pointer; padding: 10px 15px; border: none; font-weight: bold; border-radius: 4px; color: white; transition: 0.3s; }
        .btn-run { background: #27ae60; }
        .btn-scan { background: #e67e22; }
        .btn-clear { background: #e74c3c; }
        button:hover { opacity: 0.8; transform: translateY(-1px); }
        
        #scanStatus { text-align: center; font-size: 13px; color: #f1c40f; margin-top: 5px; min-height: 1.2em; font-family: monospace; }
    </style>
</head>
<body>

<div class="main-layout">
    <div class="left-panel">
        <div class="config-grid">
            <div class="rule-item"><label>AAA</label><input type="text" id="rule_AAA" placeholder="..."></div>
            <div class="rule-item"><label>AAb</label><input type="text" id="rule_AAb" placeholder="..."></div>
            <div class="rule-item"><label>AbA</label><input type="text" id="rule_AbA" placeholder="..."></div>
            <div class="rule-item"><label>Abb</label><input type="text" id="rule_Abb" placeholder="..."></div>
            <div class="rule-item"><label>bAA</label><input type="text" id="rule_bAA" placeholder="..."></div>
            <div class="rule-item"><label>bAb</label><input type="text" id="rule_bAb" placeholder="..."></div>
            <div class="rule-item"><label>bbA</label><input type="text" id="rule_bbA" placeholder="..."></div>
            <div class="rule-item"><label>bbb</label><input type="text" id="rule_bbb" placeholder="..."></div>
        </div>

        <div class="control-bar">
            <div class="input-group">
                <label>TRỐNG < :</label>
                <input type="number" id="maxGapInput" value="7" min="1">
            </div>
            <div class="input-group">
                <label>SỐ LẦN THỬ:</label>
                <input type="number" id="scanLimitInput" value="100000" min="1000">
            </div>
            <button class="btn-run" onclick="renderLogic()">CHẠY THỦ CÔNG</button>
            <button class="btn-scan" onclick="startAutoScan()">BẮT ĐẦU QUÉT</button>
        </div>

        <div style="margin-bottom:15px; display:flex; gap:10px; align-items: center;">
            <input type="file" id="fileInput" accept=".txt" style="flex:1; background:#333; padding:5px; border-radius:4px;">
            <button class="btn-clear" onclick="clearAll()">XÓA HẾT</button>
        </div>
        
        <div id="scanStatus">Sẵn sàng phân tích...</div>
        <hr style="border:0; border-top:1px solid #333; margin: 20px 0;">
        <div id="numberGrid"></div>
    </div>

    <div class="log-panel">
        <div class="log-title" id="logTitle">LOG TRỐNG</div>
        <ul id="logList"></ul>
    </div>
</div>

<script>
    const numberGrid = document.getElementById('numberGrid');
    const logList = document.getElementById('logList');
    const statusText = document.getElementById('scanStatus');
    const maxGapInput = document.getElementById('maxGapInput');
    const scanLimitInput = document.getElementById('scanLimitInput');
    const patterns = ['AAA', 'AAb', 'AbA', 'Abb', 'bAA', 'bAb', 'bbA', 'bbb'];
    let rawNumbers = localStorage.getItem('savedNumbers') || "";

    window.onload = () => {
        patterns.forEach(p => {
            const saved = localStorage.getItem('rule_' + p);
            if (saved) document.getElementById('rule_' + p).value = saved;
        });
        maxGapInput.value = localStorage.getItem('maxGapLimit') || "7";
        scanLimitInput.value = localStorage.getItem('scanLimit') || "100000";
        if (rawNumbers) renderLogic();
    };

    document.getElementById('fileInput').addEventListener('change', (e) => {
        const file = e.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = (event) => {
            rawNumbers = event.target.result.replace(/\D/g, '');
            localStorage.setItem('savedNumbers', rawNumbers);
            renderLogic();
        };
        reader.readAsText(file);
    });

    function getNumType(char) { return (parseInt(char) >= 5) ? 'A' : 'b'; }

    function clearAll() {
        localStorage.clear();
        location.reload();
    }

    function checkLogicFast(currentRules, limit) {
        let groups = [];
        for (let i = 0; i < rawNumbers.length; i += 3) groups.push(rawNumbers.substring(i, i + 3));

        let nextLabels = ["", "", ""];
        let lastGlobalIdx = -1;
        let hasMatch = false;

        for (let rowIndex = 0; rowIndex < groups.length; rowIndex++) {
            let group = groups[rowIndex];
            for (let i = 0; i < 3; i++) {
                if (!group[i]) continue;
                const currentIdx = (rowIndex * 3) + (i + 1);
                const charType = getNumType(group[i]);

                if (nextLabels[i] !== "" && charType === nextLabels[i]) {
                    if (lastGlobalIdx !== -1) {
                        if (currentIdx - lastGlobalIdx - 1 >= limit) return false; 
                    }
                    lastGlobalIdx = currentIdx;
                    hasMatch = true;
                }
            }
            let p = ""; 
            for (let char of group) p += getNumType(char);
            if (p.length === 3) {
                let r = currentRules[p];
                nextLabels = r ? r.split('') : ["", "", ""];
            } else { nextLabels = ["", "", ""]; }
        }
        return hasMatch; 
    }

    async function startAutoScan() {
        if (!rawNumbers) { alert("Hãy tải file dữ liệu!"); return; }
        
        const limit = parseInt(maxGapInput.value);
        const scanMax = parseInt(scanLimitInput.value);
        
        localStorage.setItem('maxGapLimit', limit);
        localStorage.setItem('scanLimit', scanMax);
        
        statusText.textContent = "⏳ Đang quét tổ hợp...";
        const options = ['', 'AAA', 'AAb', 'AbA', 'Abb', 'bAA', 'bAb', 'bbA', 'bbb'];
        let found = false;

        for (let i = 1; i <= scanMax; i++) {
            let testRules = {};
            patterns.forEach(p => {
                testRules[p] = options[Math.floor(Math.random() * options.length)];
            });

            if (checkLogicFast(testRules, limit)) {
                patterns.forEach(p => {
                    document.getElementById('rule_' + p).value = testRules[p];
                });
                renderLogic();
                statusText.textContent = `✅ Xong! Tìm thấy sau ${i.toLocaleString()} lần thử.`;
                found = true;
                break;
            }

            if (i % 5000 === 0) {
                statusText.textContent = `⏳ Tiến trình: ${i.toLocaleString()} / ${scanMax.toLocaleString()}...`;
                await new Promise(r => setTimeout(r, 1));
            }
        }

        if (!found) statusText.textContent = `❌ Đã quét hết ${scanMax.toLocaleString()} mẫu nhưng không thỏa mãn.`;
    }

    function renderLogic() {
        const limit = parseInt(maxGapInput.value);
        document.getElementById('logTitle').textContent = `LOG TRỐNG (>= ${limit})`;
        
        patterns.forEach(p => localStorage.setItem('rule_' + p, document.getElementById('rule_' + p).value.trim()));
        numberGrid.innerHTML = ""; logList.innerHTML = "";
        
        let groups = [];
        for (let i = 0; i < rawNumbers.length; i += 3) groups.push(rawNumbers.substring(i, i + 3));

        let nextLabels = ["", "", ""];
        let lastGlobalIdx = -1, lastRow = -1, lastPos = -1;

        groups.forEach((group, rowIndex) => {
            for (let i = 0; i < 3; i++) {
                const div = document.createElement('div');
                div.className = 'cell'; div.textContent = group[i] || "-";
                numberGrid.appendChild(div);
            }
            const sep = document.createElement('div'); sep.style.width="25px"; numberGrid.appendChild(sep);

            for (let i = 0; i < 3; i++) {
                const div = document.createElement('div');
                div.className = 'cell label';
                div.id = `k-${rowIndex}-${i}`;
                div.textContent = nextLabels[i];
                const charType = group[i] ? getNumType(group[i]) : null;

                if (nextLabels[i] !== "" && charType === nextLabels[i]) {
                    div.classList.add('match-highlight');
                    const currentIdx = (rowIndex * 3) + (i + 1);
                    if (lastGlobalIdx !== -1) {
                        let dist = currentIdx - lastGlobalIdx - 1;
                        if (dist >= limit) {
                            const li = document.createElement('li');
                            li.className = 'log-item';
                            li.innerHTML = `⚠️ Trống: <b>${dist} ô</b><br>Dòng ${lastRow+1} -> ${rowIndex+1}`;
                            
                            const start = lastGlobalIdx, end = currentIdx, rScroll = lastRow;
                            li.onclick = () => {
                                document.getElementById(`row-${rScroll}`).scrollIntoView({ behavior: 'smooth', block: 'center' });
                                document.querySelectorAll('.blink-active').forEach(el => el.classList.remove('blink-active'));
                                setTimeout(() => {
                                    for (let g = start; g <= end; g++) {
                                        let r = Math.floor((g - 1) / 3), c = (g - 1) % 3;
                                        let cell = document.getElementById(`k-${r}-${c}`);
                                        if (cell) cell.classList.add('blink-active');
                                    }
                                }, 100);
                            };
                            logList.appendChild(li);
                        }
                    }
                    lastGlobalIdx = currentIdx; lastRow = rowIndex; lastPos = i + 1;
                }
                numberGrid.appendChild(div);
            }

            const idx = document.createElement('div');
            idx.className = 'row-index'; idx.id = `row-${rowIndex}`;
            idx.textContent = rowIndex + 1;
            numberGrid.appendChild(idx);

            if (group.length === 3) {
                let p = ""; for(let char of group) p += getNumType(char);
                let r = document.getElementById('rule_'+p).value.trim();
                nextLabels = r.length === 3 ? r.split('') : ["","",""];
            } else { nextLabels = ["","",""]; }
        });
    }
</script>
</body>
                </html>
