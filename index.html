<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Phân Tích Logic - Giữ Nguyên Quy Tắc</title>
    <style>
        :root {
            --bg-color: #121212; --text-color: #e0e0e0; --container-bg: #1e1e1e;
            --border-color: #333; --cell-bg: #2d2d2d; --primary-color: #3498db;
            --highlight-color: #f1c40f; --input-bg: #333; --accent-color: #e67e22;
        }
        body {
            font-family: 'Segoe UI', Tahoma, sans-serif; background-color: var(--bg-color); color: var(--text-color);
            margin: 0; height: 100vh; display: flex; flex-direction: column; overflow: hidden; padding: 20px;
        }
        .main-layout { display: flex; gap: 20px; max-width: 1400px; margin: 0 auto; flex: 1; width: 100%; overflow: hidden; }
        
        .left-panel { flex: 2.5; overflow-y: auto; background: var(--container-bg); padding: 20px; border-radius: 12px; border: 1px solid var(--border-color); }
        .log-panel { flex: 1; background: var(--container-bg); padding: 20px; border-radius: 12px; border: 1px solid var(--border-color); display: flex; flex-direction: column; overflow: hidden; }
        
        .log-title { font-weight: bold; margin-bottom: 10px; color: var(--highlight-color); border-bottom: 1px solid #444; padding-bottom: 5px; text-align: center; }
        #logList { overflow-y: auto; list-style: none; padding: 0; margin: 0; }
        .log-item { padding: 10px; background: rgba(255,255,255,0.05); margin-bottom: 8px; border-radius: 6px; cursor: pointer; border-left: 4px solid #e74c3c; font-size: 0.85em; transition: 0.2s; }
        .log-item:hover { background: rgba(255,255,255,0.1); }

        #numberGrid { display: grid; gap: 8px; justify-content: center; padding-bottom: 50px; }
        .cell { width: 40px; height: 40px; display: flex; align-items: center; justify-content: center; border: 1px solid var(--border-color); background: var(--cell-bg); font-weight: bold; border-radius: 4px; font-size: 14px; }
        .cell.label { border-style: dashed; color: var(--primary-color); }
        .match-highlight { background-color: var(--highlight-color) !important; color: #000 !important; box-shadow: 0 0 10px var(--highlight-color); }
        .row-index { color: #666; font-size: 0.75em; display: flex; align-items: center; justify-content: center; }
        
        @keyframes flash-red {
            0% { background-color: var(--cell-bg); transform: scale(1); }
            50% { background-color: #ff4757; color: white; transform: scale(1.1); box-shadow: 0 0 15px #ff4757; }
            100% { background-color: var(--cell-bg); transform: scale(1); }
        }
        .blink-active { animation: flash-red 0.4s ease-in-out 10; z-index: 100; position: relative; }

        .config-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(80px, 1fr)); gap: 10px; margin-bottom: 15px; background: #252525; padding: 15px; border-radius: 8px; max-height: 200px; overflow-y: auto; }
        .rule-item { display: flex; flex-direction: column; align-items: center; }
        .rule-item label { font-size: 10px; margin-bottom: 4px; color: #aaa; }
        .rule-item input { width: 90%; padding: 4px; background: var(--input-bg); color: #fff; border: 1px solid #444; text-align: center; border-radius: 4px; font-size: 12px; }
        
        .control-bar { background: #2c3e50; padding: 15px; border-radius: 8px; margin-bottom: 15px; display: flex; flex-wrap: wrap; gap: 15px; align-items: center; justify-content: center; }
        .input-group { display: flex; align-items: center; gap: 8px; background: #1a1a1a; padding: 5px 12px; border-radius: 4px; border: 1px solid var(--primary-color); }
        .input-group label { font-size: 11px; font-weight: bold; color: var(--primary-color); }
        .input-group input { width: 60px; padding: 5px; background: transparent; border: none; color: white; font-weight: bold; text-align: center; }

        button { cursor: pointer; padding: 10px 15px; border: none; font-weight: bold; border-radius: 4px; color: white; transition: 0.3s; font-size: 12px; }
        .btn-run { background: #27ae60; }
        .btn-scan { background: #e67e22; }
        .btn-clear { background: #e74c3c; }
        
        #scanStatus { text-align: center; font-size: 13px; color: #f1c40f; margin-top: 5px; min-height: 1.2em; font-family: monospace; }
    </style>
</head>
<body>

<div class="main-layout">
    <div class="left-panel">
        <div id="ruleConfig" class="config-grid"></div>

        <div class="control-bar">
            <div class="input-group">
                <label>ĐỘ DÀI CỤM:</label>
                <input type="number" id="clusterSizeInput" value="3" min="1" max="10" onchange="updateClusterSize()">
            </div>
            <div class="input-group">
                <label>TRỐNG < :</label>
                <input type="number" id="maxGapInput" value="7">
            </div>
            <div class="input-group">
                <label>LẦN THỬ:</label>
                <input type="number" id="scanLimitInput" value="100000">
            </div>
            <button class="btn-run" onclick="renderLogic()">CHẠY THỦ CÔNG</button>
            <button class="btn-scan" onclick="startAutoScan()">QUÉT TỰ ĐỘNG</button>
        </div>

        <div style="margin-bottom:15px; display:flex; gap:10px; align-items: center;">
            <input type="file" id="fileInput" accept=".txt" style="flex:1; background:#333; padding:5px; border-radius:4px;">
            <button class="btn-clear" onclick="clearAll()">XÓA HẾT</button>
        </div>
        
        <div id="scanStatus">Sẵn sàng...</div>
        <hr style="border:0; border-top:1px solid #333; margin: 20px 0;">
        <div id="numberGrid"></div>
    </div>

    <div class="log-panel">
        <div class="log-title" id="logTitle">LOG TRỐNG</div>
        <ul id="logList"></ul>
    </div>
</div>

<script>
    const numberGrid = document.getElementById('numberGrid');
    const logList = document.getElementById('logList');
    const statusText = document.getElementById('scanStatus');
    const maxGapInput = document.getElementById('maxGapInput');
    const scanLimitInput = document.getElementById('scanLimitInput');
    const clusterSizeInput = document.getElementById('clusterSizeInput');
    const ruleConfig = document.getElementById('ruleConfig');
    
    let rawNumbers = localStorage.getItem('savedNumbers') || "";
    let globalRules = JSON.parse(localStorage.getItem('globalRules') || "{}");

    // Hàm cập nhật khi thay đổi độ dài cụm
    function updateClusterSize() {
        saveCurrentInputs(); // Lưu lại những gì đang nhập trước khi đổi
        initRuleInputs();
        if (rawNumbers) renderLogic();
    }

    // Lưu tất cả input hiện có vào biến toàn cục
    function saveCurrentInputs() {
        const inputs = ruleConfig.querySelectorAll('input');
        inputs.forEach(input => {
            const key = input.id.replace('rule_', '');
            if (input.value.trim() !== "") {
                globalRules[key] = input.value.trim();
            }
        });
        localStorage.setItem('globalRules', JSON.stringify(globalRules));
    }

    // Khởi tạo các ô quy tắc dựa trên độ dài cụm
    function initRuleInputs() {
        const size = parseInt(clusterSizeInput.value);
        const total = Math.pow(2, size);
        ruleConfig.innerHTML = "";
        
        for (let i = 0; i < total; i++) {
            let p = i.toString(2).padStart(size, '0').replace(/0/g, 'A').replace(/1/g, 'b');
            
            const div = document.createElement('div');
            div.className = 'rule-item';
            div.innerHTML = `<label>${p}</label><input type="text" id="rule_${p}" placeholder="...">`;
            ruleConfig.appendChild(div);
            
            // Nếu đã từng nhập quy tắc này trước đó thì điền lại
            if (globalRules[p]) {
                div.querySelector('input').value = globalRules[p];
            }
        }
    }

    window.onload = () => {
        clusterSizeInput.value = localStorage.getItem('clusterSize') || "3";
        maxGapInput.value = localStorage.getItem('maxGapLimit') || "7";
        scanLimitInput.value = localStorage.getItem('scanLimit') || "100000";
        initRuleInputs();
    };

    document.getElementById('fileInput').addEventListener('change', (e) => {
        const file = e.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = (event) => {
            rawNumbers = event.target.result.replace(/\D/g, '');
            localStorage.setItem('savedNumbers', rawNumbers);
            renderLogic();
        };
        reader.readAsText(file);
    });

    function getNumType(char) { return (parseInt(char) >= 5) ? 'A' : 'b'; }

    function clearAll() {
        localStorage.clear();
        location.reload();
    }

    // Logic kiểm tra nhanh
    function checkLogicFast(currentRules, limit, size) {
        let lastGlobalIdx = -1;
        let hasMatch = false;
        let nextLabels = Array(size).fill("");

        for (let i = 0; i < rawNumbers.length; i += size) {
            let group = rawNumbers.substring(i, i + size);
            if (group.length < size) break;

            for (let j = 0; j < size; j++) {
                const currentIdx = i + j + 1;
                const charType = getNumType(group[j]);
                if (nextLabels[j] !== "" && charType === nextLabels[j]) {
                    if (lastGlobalIdx !== -1 && (currentIdx - lastGlobalIdx - 1 >= limit)) return false;
                    lastGlobalIdx = currentIdx;
                    hasMatch = true;
                }
            }
            let p = ""; for (let char of group) p += getNumType(char);
            let r = currentRules[p] || "";
            nextLabels = r.length === size ? r.split('') : Array(size).fill("");
        }
        return hasMatch; 
    }

    async function startAutoScan() {
        if (!rawNumbers) return alert("Vui lòng tải file!");
        const size = parseInt(clusterSizeInput.value);
        const limit = parseInt(maxGapInput.value);
        const scanMax = parseInt(scanLimitInput.value);
        
        statusText.textContent = "⌛ Đang quét...";
        const patterns = [];
        for (let i = 0; i < Math.pow(2, size); i++) {
            patterns.push(i.toString(2).padStart(size, '0').replace(/0/g, 'A').replace(/1/g, 'b'));
        }

        for (let i = 1; i <= scanMax; i++) {
            let testRules = {};
            patterns.forEach(p => {
                testRules[p] = patterns[Math.floor(Math.random() * patterns.length)];
            });

            if (checkLogicFast(testRules, limit, size)) {
                patterns.forEach(p => {
                    const el = document.getElementById('rule_' + p);
                    if(el) el.value = testRules[p];
                    globalRules[p] = testRules[p];
                });
                saveCurrentInputs();
                renderLogic();
                statusText.textContent = `✅ Tìm thấy sau ${i.toLocaleString()} lần thử.`;
                return;
            }
            if (i % 5000 === 0) {
                statusText.textContent = `⏳ Đang thử: ${i.toLocaleString()}...`;
                await new Promise(r => setTimeout(r, 1));
            }
        }
        statusText.textContent = "❌ Không tìm thấy bộ nào.";
    }

    function renderLogic() {
        const size = parseInt(clusterSizeInput.value);
        const limit = parseInt(maxGapInput.value);
        
        saveCurrentInputs();
        localStorage.setItem('clusterSize', size);
        localStorage.setItem('maxGapLimit', limit);

        numberGrid.style.gridTemplateColumns = `repeat(${size}, 40px) 25px repeat(${size}, 40px) 40px`;
        numberGrid.innerHTML = ""; logList.innerHTML = "";
        
        let nextLabels = Array(size).fill("");
        let lastGlobalIdx = -1;

        for (let i = 0; i < rawNumbers.length; i += size) {
            let group = rawNumbers.substring(i, i + size);
            let rowIndex = Math.floor(i / size) + 1;

            // Hiển thị số gốc
            for (let j = 0; j < size; j++) {
                const div = document.createElement('div');
                div.className = 'cell'; div.textContent = group[j] || "-";
                numberGrid.appendChild(div);
            }
            // Khoảng cách
            const sep = document.createElement('div'); numberGrid.appendChild(sep);

            // Hiển thị dự đoán
            for (let j = 0; j < size; j++) {
                const div = document.createElement('div');
                div.className = 'cell label';
                div.id = `k-${rowIndex}-${j}`;
                div.textContent = nextLabels[j];
                
                const charType = group[j] ? getNumType(group[j]) : null;
                const currentIdx = i + j + 1;

                if (nextLabels[j] !== "" && charType === nextLabels[j]) {
                    div.classList.add('match-highlight');
                    if (lastGlobalIdx !== -1) {
                        let dist = currentIdx - lastGlobalIdx - 1;
                        if (dist >= limit) {
                            const li = document.createElement('li');
                            li.className = 'log-item';
                            li.innerHTML = `⚠️ Trống: <b>${dist}</b> (Dòng ${rowIndex})`;
                            logList.appendChild(li);
                        }
                    }
                    lastGlobalIdx = currentIdx;
                }
                numberGrid.appendChild(div);
            }
            const idx = document.createElement('div');
            idx.className = 'row-index'; idx.textContent = rowIndex;
            numberGrid.appendChild(idx);

            // Chuẩn bị nhãn cho dòng tiếp theo
            let p = ""; for (let char of group) p += getNumType(char);
            if (p.length === size) {
                let r = globalRules[p] || "";
                nextLabels = r.length === size ? r.split('') : Array(size).fill("");
            } else { nextLabels = Array(size).fill(""); }
        }
    }
</script>
</body>
                </html>
