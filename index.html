<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Số Hóa Dữ Liệu - Grid View</title>
    <style>
        :root {
            --bg-color: #f4f4f9;
            --text-color: #333;
            --container-bg: #ffffff;
            --border-color: #ddd;
            --cell-bg: #fff;
            --primary-color: #4a90e2;
        }

        [data-theme="dark"] {
            --bg-color: #1a1a1a;
            --text-color: #f0f0f0;
            --container-bg: #2d2d2d;
            --border-color: #444;
            --cell-bg: #3d3d3d;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 20px;
            transition: all 0.3s ease;
        }

        .container {
            max-width: 100%;
            margin: 0 auto;
            background: var(--container-bg);
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }

        h2 { text-align: center; margin-top: 0; }

        .controls {
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
            margin-bottom: 25px;
            padding: 15px;
            border-bottom: 2px solid var(--border-color);
            align-items: center;
        }

        .control-group { display: flex; align-items: center; gap: 8px; }

        input[type="number"], input[type="file"] {
            padding: 8px;
            border: 1px solid var(--border-color);
            border-radius: 4px;
            background: var(--cell-bg);
            color: var(--text-color);
        }

        button {
            padding: 10px 20px;
            cursor: pointer;
            border: none;
            border-radius: 5px;
            background-color: var(--primary-color);
            color: white;
            font-weight: bold;
            transition: opacity 0.2s;
        }

        button:hover { opacity: 0.8; }

        /* Grid System */
        #numberGrid {
            display: grid;
            gap: 8px;
            justify-content: center;
            margin-top: 20px;
        }

        .cell {
            width: 30px;
            height: 30px;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 1px solid var(--border-color);
            background: var(--cell-bg);
            border-radius: 4px;
            font-weight: bold;
            font-size: 1.1em;
        }

        .theme-toggle { margin-left: auto; }
    </style>
</head>
<body>

<div class="container">
    <h2>Trình Hiển Thị Số Theo Nhóm</h2>

    <div class="controls">
        <div class="control-group">
            <label>Upload File:</label>
            <input type="file" id="fileInput" accept=".txt">
        </div>

        <div class="control-group">
            <label>Số ô mỗi nhóm:</label>
            <input type="number" id="groupSize" value="10" min="1" style="width: 60px;">
        </div>

        <button onclick="clearData()" style="background: #e74c3c;">Xóa dữ liệu</button>

        <div class="theme-toggle">
            <button onclick="toggleDarkMode()">Chế độ Sáng/Tối</button>
        </div>
    </div>

    <div id="numberGrid"></div>
</div>

<script>
    const fileInput = document.getElementById('fileInput');
    const groupSizeInput = document.getElementById('groupSize');
    const numberGrid = document.getElementById('numberGrid');
    let rawNumbers = "";

    // 1. Khởi tạo khi load trang
    window.onload = () => {
        // Load theme
        if (localStorage.getItem('theme') === 'dark') {
            document.body.setAttribute('data-theme', 'dark');
        }

        // Load dữ liệu cũ
        rawNumbers = localStorage.getItem('savedNumbers') || "";
        const savedSize = localStorage.getItem('savedGroupSize');
        if (savedSize) groupSizeInput.value = savedSize;

        if (rawNumbers) renderGrid();
    };

    // 2. Xử lý Upload File
    fileInput.addEventListener('change', (e) => {
        const file = e.target.files[0];
        if (!file) return;

        const reader = new FileReader();
        reader.onload = (event) => {
            const content = event.target.result;
            // Chỉ lấy các chữ số 0-9
            rawNumbers = content.replace(/\D/g, '');
            localStorage.setItem('savedNumbers', rawNumbers);
            renderGrid();
        };
        reader.readAsText(file);
    });

    // 3. Xử lý thay đổi số ô mỗi nhóm
    groupSizeInput.addEventListener('input', () => {
        localStorage.setItem('savedGroupSize', groupSizeInput.value);
        renderGrid();
    });

    // 4. Hàm Render chính
    function renderGrid() {
        numberGrid.innerHTML = "";
        const size = parseInt(groupSizeInput.value) || 10;
        
        // Thiết lập số cột cho Grid
        numberGrid.style.gridTemplateColumns = `repeat(${size}, 40px)`;

        const fragment = document.createDocumentFragment();
        
        for (let char of rawNumbers) {
            const div = document.createElement('div');
            div.className = 'cell';
            div.textContent = char;
            fragment.appendChild(div);
        }
        
        numberGrid.appendChild(fragment);
    }

    // 5. Dark Mode
    function toggleDarkMode() {
        const currentTheme = document.body.getAttribute('data-theme');
        if (currentTheme === 'dark') {
            document.body.removeAttribute('data-theme');
            localStorage.setItem('theme', 'light');
        } else {
            document.body.setAttribute('data-theme', 'dark');
            localStorage.setItem('theme', 'dark');
        }
    }

    // 6. Xóa dữ liệu
    function clearData() {
        if (confirm("Bạn có chắc muốn xóa dữ liệu đã lưu?")) {
            localStorage.removeItem('savedNumbers');
            rawNumbers = "";
            numberGrid.innerHTML = "";
            fileInput.value = "";
        }
    }
</script>

</body>
</html>
